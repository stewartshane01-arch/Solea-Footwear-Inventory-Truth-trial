version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: solea_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-inventory_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - solea_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: solea_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@gmail.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    networks:
      - solea_network
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      
networks:
  solea_network:
    driver: bridge

volumes:
  postgres_data:
  pgadmin_data: